openapi: 3.0.3
info:
  title: Creditra API
  version: 0.1.0
  description: |
    Backend API for Creditra – on-chain credit scoring and risk evaluation.

    Browser clients are restricted by a CORS allowlist. Production deployments
    must set `CORS_ORIGINS` to a comma-separated list of exact origins; local
    development falls back to loopback origins when the variable is unset.

    ## Authentication
    Protected endpoints require a valid API key passed via the `X-API-Key` header.
    API keys are configured via the `API_KEYS` environment variable (comma-separated).

    ## Keeping the spec in sync
    - Every new route **must** have a corresponding entry here before merging.
    - Run `npm run validate:spec` in CI to catch YAML/structural errors early.
    - Use path-level `operationId` values as the source of truth for client generation.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Service liveness check
  - name: Credit
    description: Credit line management
  - name: Risk
    description: On-chain risk evaluation
  - name: Webhooks
    description: Draw confirmation webhook management

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for authenticated endpoints. Required for admin operations.
        Keys are configured via the `API_KEYS` environment variable.

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: creditra-backend

    # ── Credit Line Schemas ──────────────────────────────────────────────────

    CreateCreditLineRequest:
      type: object
      required: [walletAddress, requestedLimit]
      properties:
        walletAddress:
          type: string
          minLength: 1
          maxLength: 256
          description: Stellar wallet address
          example: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
        requestedLimit:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
          description: Requested credit limit as a decimal string
          example: "1000.00"
      additionalProperties: false

    UpdateCreditLineRequest:
      type: object
      properties:
        creditLimit:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
          description: Updated credit limit
          example: "1500.00"
        interestRateBps:
          type: number
          description: Interest rate in basis points
          example: 640
        status:
          type: string
          enum: [active, suspended, closed]
          description: Credit line status
      additionalProperties: false

    CreditLine:
      type: object
      properties:
        id:
          type: string
          description: Unique credit line identifier
          example: "cl_abc123"
        walletAddress:
          type: string
          description: Associated Stellar wallet address
          example: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
        creditLimit:
          type: string
          description: Approved credit limit
          example: "720.00000000"
        currentBalance:
          type: string
          description: Current outstanding balance
          example: "100.00000000"
        availableCredit:
          type: string
          description: Available credit (creditLimit - currentBalance)
          example: "620.00000000"
        interestRateBps:
          type: number
          description: Interest rate in basis points
          example: 640
        status:
          type: string
          enum: [active, suspended, closed]
          description: Current credit line status
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 last update timestamp

    CreditLinesResponse:
      type: object
      required: [creditLines, pagination]
      properties:
        creditLines:
          type: array
          items:
            $ref: "#/components/schemas/CreditLine"
        pagination:
          type: object
          properties:
            total:
              type: integer
            offset:
              type: integer
            limit:
              type: integer
          required: [total, offset, limit]

    WalletCreditLinesResponse:
      type: object
      required: [creditLines]
      properties:
        creditLines:
          type: array
          items:
            $ref: "#/components/schemas/CreditLine"

    CreditLineActionResponse:
      type: object
      required: [line, message]
      properties:
        line:
          $ref: "#/components/schemas/CreditLine"
        message:
          type: string
          example: "Credit line suspended."

    # ── Transaction Schemas ──────────────────────────────────────────────────

    Transaction:
      type: object
      required: [id, creditLineId, type, amount, currency, timestamp, metadata]
      properties:
        id:
          type: string
          format: uuid
          description: Unique transaction identifier
        creditLineId:
          type: string
          description: ID of the credit line this transaction belongs to
        type:
          type: string
          enum: [borrow, repay, interest_accrual, fee, status_change]
          description: Transaction type
        amount:
          type: string
          nullable: true
          description: Transaction amount as a decimal string; null for status changes
          example: "500.00000000"
        currency:
          type: string
          nullable: true
          description: Currency code (e.g. USDC); null for status changes
          example: USDC
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the transaction occurred
        metadata:
          type: object
          additionalProperties: true
          description: Additional context; status changes include an 'action' field
          example:
            action: created

    TransactionHistoryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [transactions, total, page, limit, totalPages]
          properties:
            transactions:
              type: array
              items:
                $ref: "#/components/schemas/Transaction"
            total:
              type: integer
              description: Total number of transactions matching the applied filters
            page:
              type: integer
              description: Current page number (1-indexed)
            limit:
              type: integer
              description: Maximum number of transactions per page
            totalPages:
              type: integer
              description: Total number of pages available

    # ── Risk Evaluation Schemas ───────────────────────────────────────────────

    RiskEvaluateRequest:
      type: object
      required: [walletAddress]
      properties:
        walletAddress:
          type: string
          description: Stellar wallet address to evaluate
          example: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
        forceRefresh:
          type: boolean
          description: Optional hint to bypass cache and recalculate risk
          default: false
      additionalProperties: false

    RiskEvaluateResponse:
      type: object
      required: [walletAddress, riskScore, creditLimit, interestRateBps, message]
      properties:
        walletAddress:
          type: string
          example: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
        riskScore:
          type: number
          description: Risk score (0-100)
          example: 72
        creditLimit:
          type: string
          description: Recommended credit limit
          example: "720.00000000"
        interestRateBps:
          type: number
          description: Recommended interest rate in basis points
          example: 640
        message:
          type: string
          example: "New risk evaluation completed"

    RiskEvaluateApiResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/RiskEvaluateResponse"
        error:
          type: string
          nullable: true

    RiskEvaluation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique evaluation identifier
        walletAddress:
          type: string
          description: Evaluated wallet address
        riskScore:
          type: number
          description: Risk score (0-100)
        creditLimit:
          type: string
          description: Recommended credit limit
        interestRateBps:
          type: number
          description: Recommended interest rate in basis points
        factors:
          type: object
          additionalProperties: true
          description: Risk evaluation factors and weights
        evaluatedAt:
          type: string
          format: date-time
          description: ISO 8601 evaluation timestamp

    RiskEvaluationHistoryResponse:
      type: object
      required: [evaluations]
      properties:
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/RiskEvaluation"

    # ── Webhook Schemas ───────────────────────────────────────────────────────

    WebhookConfigResponse:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          example: ["https://example.com/webhook"]
        maxRetries:
          type: integer
          example: 3
        initialBackoffMs:
          type: integer
          example: 1000
        backoffMultiplier:
          type: number
          example: 2.0
        timeoutMs:
          type: integer
          example: 10000
        configured:
          type: boolean
          example: true

    WebhookTestResponse:
      type: object
      properties:
        total:
          type: integer
        reachable:
          type: integer
        unreachable:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              reachable:
                type: boolean
              error:
                type: string
                nullable: true

    WebhookHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [active, disabled]
        urls:
          type: integer
          description: Number of configured webhook URLs
        maxRetries:
          type: integer
        timeoutMs:
          type: integer

    AdminRecalibrateResponse:
      type: object
      properties:
        message:
          type: string
          example: "Risk model recalibration triggered"

    # ── Error Schemas ─────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        id:
          type: string
          description: Present on 404 responses that reference a specific resource

    RateLimitErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Too many requests"

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: creditra-backend

  # ── Credit Lines Routes ─────────────────────────────────────────────────────

  /api/credit/lines:
    get:
      summary: Get Credit Lines
      description: |
        Returns all available credit lines with pagination support.
        
        Supports two pagination modes:
        - **Offset-based** (legacy): Use `offset` and `limit` parameters
        - **Cursor-based** (recommended): Use `cursor` and `limit` parameters
        
        Cursor pagination provides stable results for large datasets and is recommended
        for production use. The response includes a `nextCursor` field that can be used
        to fetch the next page of results.
      parameters:
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: |
            Pagination offset (offset-based pagination only).
            Cannot be used together with `cursor` parameter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          description: Number of credit lines per page (works with both pagination modes)
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Cursor for pagination (cursor-based pagination).
            Use the `nextCursor` value from a previous response to fetch the next page.
            When provided, `offset` parameter is ignored.
      responses:
        "200":
          description: Array of credit lines (may be empty)
          headers:
            X-RateLimit-Limit:
              description: Maximum requests allowed per window
              schema:
                type: integer
                example: 100
            X-RateLimit-Remaining:
              description: Requests remaining in current window
              schema:
                type: integer
                example: 95
            X-RateLimit-Reset:
              description: Unix timestamp when the rate limit window resets
              schema:
                type: integer
                example: 1700000060
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CreditLinesOffsetResponse'
                  - $ref: '#/components/schemas/CreditLinesCursorResponse'
        '400':
          description: Bad Request (Invalid pagination parameters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: integer
                example: 47
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-RateLimit-Reset:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorResponse"

    post:
      tags: [Credit]
      operationId: createCreditLine
      summary: Create a new credit line
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditLineRequest"
            example:
              walletAddress: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
              requestedLimit: "1000.00"
      responses:
        "201":
          description: Credit line created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLine"
        "400":
          description: Validation error or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credit/lines/{id}:
    get:
      tags: [Credit]
      operationId: getCreditLineById
      summary: Get a credit line by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credit line identifier
      responses:
        "200":
          description: Credit line found
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-RateLimit-Reset:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLine"
        "404":
          description: Credit line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Credit line not found
                id: "abc123"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-RateLimit-Reset:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorResponse"

    put:
      tags: [Credit]
      operationId: updateCreditLine
      summary: Update a credit line
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credit line identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreditLineRequest"
            example:
              creditLimit: "1500.00"
              interestRateBps: 640
              status: active
      responses:
        "200":
          description: Credit line updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLine"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Credit line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Credit]
      operationId: deleteCreditLine
      summary: Delete a credit line
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credit line identifier
      responses:
        "204":
          description: Credit line deleted successfully
        "404":
          description: Credit line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credit/lines/{id}/transactions:
    get:
      tags: [Credit]
      operationId: getCreditLineTransactions
      summary: List transaction history for a credit line
      description: |
        Returns a paginated list of transactions for the given credit line.
        Supports optional filtering by transaction type and date range.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credit line identifier
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [borrow, repay, interest_accrual, fee, status_change]
          description: Filter by transaction type
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include only transactions at or after this ISO 8601 timestamp (inclusive)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include only transactions at or before this ISO 8601 timestamp (inclusive)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of transactions per page
      responses:
        "200":
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionHistoryResponse"
              example:
                data:
                  transactions:
                    - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      creditLineId: "line-abc"
                      type: status_change
                      amount: null
                      currency: null
                      timestamp: "2024-01-15T10:00:00.000Z"
                      metadata:
                        action: created
                  total: 1
                  page: 1
                  limit: 20
                  totalPages: 1
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Invalid type filter. Must be one of: borrow, repay, interest_accrual, fee, status_change."
        "404":
          description: Credit line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credit/lines/{id}/suspend:
    post:
      tags: [Credit]
      operationId: suspendCreditLine
      summary: Suspend a credit line
      description: |
        Suspends the specified credit line, preventing further draws.
        Requires API key authentication.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credit line identifier
      responses:
        "200":
          description: Credit line suspended successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLineActionResponse"
        "401":
          description: API key missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
        "403":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Forbidden
        "404":
          description: Credit line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credit/lines/{id}/close:
    post:
      tags: [Credit]
      operationId: closeCreditLine
      summary: Close a credit line
      description: |
        Closes the specified credit line permanently.
        Requires API key authentication.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credit line identifier
      responses:
        "200":
          description: Credit line closed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLineActionResponse"
        "401":
          description: API key missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
        "403":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Forbidden
        "404":
          description: Credit line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credit/wallet/{walletAddress}/lines:
    get:
      tags: [Credit]
      operationId: getCreditLinesByWallet
      summary: Get credit lines for a specific wallet
      security: []
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address
      responses:
        "200":
          description: Credit lines for the wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletCreditLinesResponse"
              example:
                creditLines:
                  - id: "cl_abc123"
                    walletAddress: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
                    creditLimit: "720.00000000"
                    currentBalance: "100.00000000"
                    availableCredit: "620.00000000"
                    interestRateBps: 640
                    status: active
                    createdAt: "2024-01-15T10:00:00.000Z"
                    updatedAt: "2024-01-15T10:00:00.000Z"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Risk Evaluation Routes ──────────────────────────────────────────────────

  /api/risk/evaluate:
    post:
      tags: [Risk]
      operationId: evaluateRisk
      summary: Evaluate on-chain risk for a wallet
      description: |
        Performs a fresh risk evaluation for the given Stellar wallet address.
        Rate limited: default 10 requests per minute per IP address.
        Configure via RATE_LIMIT_MAX_EVALUATE and RATE_LIMIT_WINDOW_MS env vars.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskEvaluateRequest"
            example:
              walletAddress: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
              forceRefresh: false
      responses:
        "200":
          description: Risk evaluation result
          headers:
            X-RateLimit-Limit:
              description: Maximum requests allowed per window
              schema:
                type: integer
                example: 10
            X-RateLimit-Remaining:
              description: Requests remaining in current window
              schema:
                type: integer
            X-RateLimit-Reset:
              description: Unix timestamp when the rate limit window resets
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskEvaluateApiResponse"
              example:
                data:
                  walletAddress: "GDRXE2BQUC3AZNPVFSCEZ76NJ3WWL25FYFK6RGZGIEKWE4SOUJ3LNLRK"
                  riskScore: 72
                  creditLimit: "720.00000000"
                  interestRateBps: 640
                  message: New risk evaluation completed
                error: null
        "400":
          description: Missing required field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Validation failed
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorResponse"

  /api/reconciliation/trigger:
    post:
      summary: Trigger Credit Reconciliation
      description: |
        Manually trigger a reconciliation job that compares on-chain Credit contract 
        records with database credit lines and flags any drift.
        
        Requires admin authentication via X-API-Key header.
      security:
        - ApiKeyAuth: []
      responses:
        '202':
          description: Reconciliation job scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                        description: Unique identifier for the scheduled job
                      message:
                        type: string
                        example: 'Reconciliation job scheduled'
                  error:
                    type: "null"
        '401':
          description: Unauthorized (Missing or invalid API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'

  /api/reconciliation/status:
    get:
      summary: Get Reconciliation Status
      description: |
        Returns the current status of the reconciliation worker including:
        - Whether the worker is running
        - Number of jobs in the queue
        - Number of failed jobs
        
        Requires admin authentication via X-API-Key header.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Reconciliation status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      workerRunning:
                        type: boolean
                        description: Whether the reconciliation worker is active
                      queueSize:
                        type: integer
                        description: Number of pending jobs in the queue
                      failedJobs:
                        type: integer
                        description: Number of jobs that have failed
                  error:
                    type: "null"
        '401':
          description: Unauthorized (Missing or invalid API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for admin endpoints

  schemas:
    SuccessResponse:
      type: object
      properties:
        data:
          description: The payload of the successful response. Varies by endpoint.
          type: object
        error:
          description: Error message. Always null for successful responses.
          type: "null"
      required:
        - data
        - error

    FailureResponse:
      type: object
      properties:
        data:
          description: Data payload. Always null for failed responses.
          type: "null"
        error:
          description: The error message detailing what went wrong.
          type: string
      required:
        - data
        - error

    CreditLine:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the credit line
        walletAddress:
          type: string
          description: Stellar wallet address
        creditLimit:
          type: string
          description: Maximum credit limit (decimal string)
        availableCredit:
          type: string
          description: Currently available credit (decimal string)
        interestRateBps:
          type: integer
          description: Interest rate in basis points (e.g., 500 = 5%)
        status:
          type: string
          enum: [active, suspended, closed, pending]
          description: Current status of the credit line
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    CreditLinesOffsetResponse:
      type: object
      description: Response format for offset-based pagination
      properties:
        creditLines:
          type: array
          items:
            $ref: '#/components/schemas/CreditLine'
        pagination:
          type: object
          properties:
            total:
              type: integer
              description: Total number of credit lines
            offset:
              type: integer
              description: Current offset
            limit:
              type: integer
              description: Number of items per page
          required:
            - total
            - offset
            - limit
      required:
        - creditLines
        - pagination

    CreditLinesCursorResponse:
      type: object
      description: Response format for cursor-based pagination
      properties:
        creditLines:
          type: array
          items:
            $ref: '#/components/schemas/CreditLine'
        pagination:
          type: object
          properties:
            limit:
              type: integer
              description: Number of items per page
            nextCursor:
              type: string
              nullable: true
              description: Cursor for the next page (null if no more pages)
            hasMore:
              type: boolean
              description: Whether more results are available
          required:
            - limit
            - nextCursor
            - hasMore
      required:
        - creditLines
        - pagination
